<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Management System - Logo</title>
    <link rel="stylesheet" href="placeholders.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1E3932;
            padding: 20px;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            width: 200px;
            height: 200px;
            background-color: white;
            color: #1E3932;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-radius: 50%;
            margin: 0 auto;
            font-weight: bold;
        }
        
        .logo-text {
            color: white;
            font-size: 28px;
            margin-top: 20px;
            font-weight: bold;
        }
        
        .logo-white {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo">CMS</div>
        <div class="logo-text">Cafe Management System</div>
    </div>
    
    <div class="logo-white">
        <div class="logo" style="background-color: #1E3932; color: white;">CMS</div>
    </div>
</body>
</html>
